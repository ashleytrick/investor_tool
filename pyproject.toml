[project]
name = "investor-outreach"
version = "0.1.0"
description = "Workspace-based VC partner outreach pipeline. CSV-first."
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "selectolax>=0.3.21",
    "anthropic>=0.40",
    "sqlalchemy>=2.0",
    "pyyaml>=6.0",
    "pydantic>=2.7",
    "aiolimiter>=1.1",
    "tenacity>=8.3",
    "rapidfuzz>=3.9",
    "python-dotenv>=1.0",
]

[tool.uv]
package = false
dev-dependencies = [
    "pytest>=8.0",
]
