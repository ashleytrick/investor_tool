[project]
name = "investor-outreach"
version = "0.1.0"
description = "Workspace-based VC partner outreach pipeline. CSV-first."
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "selectolax>=0.3.21",
    "anthropic>=0.40",
    "sqlalchemy>=2.0",
    "pyyaml>=6.0",
    "pydantic>=2.7",
    "aiolimiter>=1.1",
    "tenacity>=8.3",
    "rapidfuzz>=3.9",
    "python-dotenv>=1.0",
    "google-api-python-client>=2.100",
    "google-auth-oauthlib>=1.2",
    "feedparser>=6.0",
]

[project.optional-dependencies]
# Web operator UI (Streamlit). Install with: uv sync --extra web
web = [
    "streamlit>=1.40",
]
# FastAPI backend that the external React frontend talks to.
# Install with: uv sync --extra api
api = [
    "fastapi>=0.115",
    "pypdf>=5.0",
    "python-pptx>=1.0",
    "uvicorn[standard]>=0.30",
]

[tool.uv]
package = false
dev-dependencies = [
    "pytest>=8.0",
]
