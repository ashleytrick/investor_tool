name: CI

on:
  pull_request:
    # Re-trigger when a draft is marked ready (the `if:` guard
    # below skips the smoke job while the PR is still a draft, so
    # this event is what kicks CI when the operator hits 'ready
    # for review').
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

# Cancel any in-progress run for the same ref when a new push
# lands. Without this, a series of force-pushes to a PR branch
# would queue up N copies of the 8-shard matrix even though only
# the latest is useful. `cancel-in-progress: true` kills the
# stale run so the queue stays bounded by (#open PRs × shards),
# not (#open PRs × shards × #force-pushes-per-PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    # Skip the matrix entirely while the PR is a draft. CI re-
    # triggers on the `ready_for_review` event above when the
    # operator marks it ready -- so the signal still arrives,
    # just at the point it actually matters.
    #
    # Pushes to main always run (github.event.pull_request is
    # null on push events, and the `==` against False evaluates
    # truthy in GHA expressions; the explicit `!=` against the
    # draft boolean keeps it readable).
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    # Test sharding via pytest-split: 8 GHA jobs run in parallel,
    # each handling 1/8 of the suite. Wall-clock = max(shard) rather
    # than sum(all), so a 7min serial run becomes ~1min parallel.
    #
    # Each shard runs on its own ubuntu-latest (2 vCPU). Total billed
    # minutes go up vs serial (8 jobs * ~1min vs 1 job * 7min ≈ +14%
    # compute) but PR feedback is ~7x faster. Diminishing returns
    # past 8 shards because the per-shard fixture build + uv install
    # overhead starts to dominate vs the actual test time.
    #
    # Upgrade to ubuntu-latest-4-core (paid larger runner) if the
    # per-shard 2-core runner becomes the bottleneck.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    name: smoke (shard ${{ matrix.shard }}/8)
    runs-on: ubuntu-latest
    # Per-shard timeout. Whole suite serial was ~15 min; a single
    # shard is a quarter of that plus the fixture build, so 10 is
    # generous headroom.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      # Belt-and-suspenders on top of setup-uv's built-in cache.
      # On a cold runner the install dominates the shard time;
      # this restores the package cache directly so resolution
      # short-circuits.
      - name: Cache uv package cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      - name: Install dependencies
        # `web` (Streamlit) + `api` (FastAPI) extras must be pulled
        # in so their tests collect. Adding a new extra to
        # pyproject.toml? Add it here too.
        run: uv sync --frozen --extra api --extra web
      # Cache the pre-built `_scored_workspace_source` (the post-
      # Stage-6 pipeline.db + workspace files). Cache key is a
      # hash of every input that influences the build output:
      # Stage 1-6 source, the LLM/pipeline core modules, and the
      # test_workspace seed fixtures. Cache hit -> the conftest
      # fixture short-circuits to the restored dir + skips the
      # ~10s build per shard.
      - name: Cache scored workspace fixture
        uses: actions/cache@v4
        with:
          path: .scored_ws_cache
          key: scored-ws-${{ runner.os }}-${{ hashFiles('core/**/*.py', 'scripts/0[1-6]_*.py', 'clients/test_workspace/**', 'prompts/**', 'schemas/**') }}
          restore-keys: |
            scored-ws-${{ runner.os }}-
      - name: Run smoke tests (shard ${{ matrix.shard }}/8)
        env:
          # Force stub mode so no real API calls are made during CI.
          ANTHROPIC_API_KEY: ""
          # Pin the conftest fixture cache to a workspace-relative
          # path so actions/cache can save/restore it. The fixture
          # uses filelock to coordinate xdist workers; combined with
          # this cache, only the first shard to miss the cache pays
          # the Stage 1-6 build cost.
          PYTEST_SCORED_WS_CACHE: ${{ github.workspace }}/.scored_ws_cache
        run: |
          set +e
          # `--splits 8 --group N`: pytest-split assigns roughly
          # equal-duration test buckets per group (using the
          # checked-in `.test_durations` file). Each group runs
          # `-n auto` inside (xdist still parallelizes within the
          # shard on the 2 cores GHA gives).
          #
          # `--tb=short -ra` keeps the same failure-output verbosity
          # as before. `-q` replaces `-v` because xdist's per-worker
          # output makes -v unreadable; the durations + failure tail
          # are what reviewers actually scan.
          uv run pytest tests/ \
            --splits 8 --group ${{ matrix.shard }} \
            -n auto -q --tb=short -ra --durations=15 \
            2>&1 | tee pytest.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then
            echo "::error::pytest exited $rc (shard ${{ matrix.shard }}/8)"
            {
              echo "## Pytest output (tail) -- shard ${{ matrix.shard }}/8"
              echo ""
              echo '```'
              tail -200 pytest.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $rc
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-shard-${{ matrix.shard }}
          path: pytest.log
          if-no-files-found: warn
