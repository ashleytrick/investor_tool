name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Run smoke tests
        env:
          # Force stub mode so no real API calls are made during CI.
          ANTHROPIC_API_KEY: ""
        run: uv run pytest tests/ -v
