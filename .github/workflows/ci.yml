name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    # Suite runs in ~3-4 min on GHA's 2-core runner with xdist -n auto;
    # 15 still gives headroom for cold cache + the e2e tests that
    # subprocess-spawn the pipeline.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dependencies
        # `web` (Streamlit) + `api` (FastAPI) extras must be pulled
        # in so their tests collect. Adding a new extra to
        # pyproject.toml? Add it here too.
        run: uv sync --extra api --extra web
      - name: Run smoke tests
        env:
          # Force stub mode so no real API calls are made during CI.
          ANTHROPIC_API_KEY: ""
        run: |
          set +e
          # `-n auto` -- pytest-xdist fans the suite out across
          # available CPU cores. On GHA's 2-core runners that's ~1.7x
          # speedup; on a 4+ core developer machine 3x+. Each worker
          # gets its own subprocess + tmp_path; tests are already
          # isolated, so no extra orchestration is needed.
          #
          # `--tb=short -ra` keeps the same failure-output verbosity
          # as before. `-q` replaces `-v` because xdist's per-worker
          # output makes -v unreadable; the durations + failure tail
          # are what reviewers actually scan.
          uv run pytest tests/ -n auto -q --tb=short -ra --durations=15 2>&1 | tee pytest.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then
            echo "::error::pytest exited $rc"
            {
              echo "## Pytest output (tail)"
              echo ""
              echo '```'
              tail -200 pytest.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $rc
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest.log
          if-no-files-found: warn
